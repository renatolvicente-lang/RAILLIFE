<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/style.css">
    <title>RAILLIFE</title>
</head>
<body class="body_log_head">

    <header class="cad_log_head">

        <img class="logo_inicio" src="../assets/images/Logo RAILLIFE.png" alt="RAILLIFE">

    </header>

    <main class="cad_log_main">

        

        <div class="container_cad_log">

            

            <h2 class="titulo_cad_log">
                CADASTRO
            </h2>
                
                <form id="form-login">
                    <br>
                <div id="c-usuario" classe="conjunto">
                    <label class="container" for="usuario">Usuário: </label>
                    <input type="usuario" id="usuario" placeholder="usuario" required>
                </div>
                <br>
                <div id="c-senha" classe="conjunto">
                    <label class="container" for="senha">Senha: </label>
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>

        </div>

    </main>

    <footer class="cad_log_foot">
        
    </footer>

</body>
</html>
