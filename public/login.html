<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/style.css">
    <title>RAILLIFE</title>
</head>
<body class="body_log_head">

    <header class="cad_log_head">

        <img class="logo_inicio" src="../assets/images/Logo RAILLIFE.png" alt="RAILLIFE">

    </header>

    <main class="cad_log_main">

        

        <div class="container_cad_log">

            

            <h2 class="titulo_cad_log">
                LOGIN
            </h2>
                
                <form id="form-login">
                    <br>
                <div id="c-email" classe="conjunto">
                    <label class="container" for="email">Email: <br></label>
                    <input type="email" id="campo-login" placeholder="Ex.: user@gmail.com" required>
                </div>
                <br>
                <div id="c-senha" classe="conjunto">
                    <label class="container" for="senha">Senha: <br> </label>
                    <input type="password" id="campo-login" placeholder="Senha" required>
                </div>

                <br>
            <button id="conectar-login" type="submit">Conectar</button>
            <br>
            <br>
            </div>
            

    </main>

    <footer class="cad_log_foot">
        
    </footer>

</body>
</html>
