<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/style.css">
    <title>RAILLIFE</title>
</head>

<body>

    <header class="cad_log_head">
        <img src="../assets/images/Logo RAILLIFE.png" alt="RAILLIFE">
    </header>

    <main class="cad_log_main">



        <div class="container_cad_log">



            <h2 class="titulo_cad_log">
                LOGIN
            </h2>

            <p>

            <form id="form-login">

                <div id="c-email" classe="conjunto">
                    <label class="container" for="email">Email: </label>
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <div id="c-senha" classe="conjunto">
                    <label class="container" for="senha">Senha: </label>
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>

                <br>
                <button id="botao-envio" type="submit">Entrar</button>

            </form>


            </p>
        </div>

    </main>

    <footer class="cad_log_foot">

    </footer>

</body>

</html>
